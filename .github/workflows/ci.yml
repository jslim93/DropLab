name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Run tests (fast)
        run: python -m pytest tests/ -m "not slow" -v

  # Heavier, single-version gate for the climate-intervention teaching materials:
  # the full-resolution MCB-forcing magnitude guard plus an end-to-end execution
  # of the student notebook, so an API change can't silently break the lesson.
  climate-deliverables:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest nbconvert ipykernel
          python -m ipykernel install --user --name python3
      - name: Slow physics gate (MCB forcing magnitude)
        run: python -m pytest tests/ -m slow -v
      - name: Execute the teaching notebook end-to-end
        run: |
          jupyter nbconvert --to notebook --execute \
            --ExecutePreprocessor.timeout=600 \
            --output /tmp/_executed.ipynb \
            notebooks/Climate_Intervention.ipynb
